version: "3.8"

# ─────────────────────────────────────────────────────────────────
#  LogiBrain — Infraestructura de datos local (desarrollo)
#  Servicios: PostgreSQL 15  +  pgAdmin 4
# ─────────────────────────────────────────────────────────────────

services:

  # ── Base de datos principal ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: logibrain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-logibrain_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-logibrain_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data: